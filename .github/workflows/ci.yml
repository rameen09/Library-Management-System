name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download self-contained SQLite JDBC driver
        run: curl -L -o lib/sqlite-jdbc.jar https://repo1.maven.org/maven2/org/xerial/sqlite-jdbc/3.44.1.0/sqlite-jdbc-3.44.1.0.jar

      - name: Compile main source
        run: javac -cp "lib/sqlite-jdbc.jar" -d build src/main/java/library/*.java

      - name: Compile tests
        run: |
          javac -cp "build:lib/sqlite-jdbc.jar:lib/slf4j-api.jar:lib/slf4j-nop.jar:lib/junit4.jar:lib/hamcrest-core.jar" \
                -d build src/test/java/library/*.java

      - name: Run JUnit test suite
        run: |
          java -cp "build:lib/sqlite-jdbc.jar:lib/slf4j-api.jar:lib/slf4j-nop.jar:lib/junit4.jar:lib/hamcrest-core.jar" \
               org.junit.runner.JUnitCore library.LibraryServiceTest
